name: CI Demo

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Print message
        run: echo "CI is running 🚀"

      - name: List files
        run: ls -la
      - name: Show current directory
        run: pwd 